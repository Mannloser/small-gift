<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for guava.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0000;
    font-family: 'Inter', sans-serif;
    color: #f0dede;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .lock-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .bg-blob {
    position: absolute;
    border-radius: 50%;
    background: #c4a8d4;
    opacity: 0.04;
    pointer-events: none;
  }

  .big-clock {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 13vw, 6rem);
    font-weight: 700;
    color: #810000;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 0.4rem;
    position: relative;
    z-index: 1;
  }

  .clock-date {
    font-size: 12px;
    color: #5a2020;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .lock-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 4.5vw, 2rem);
    font-weight: 500;
    font-style: italic;
    color: #e8c0c0;
    margin-bottom: 0.75rem;
    position: relative;
    z-index: 1;
  }

  .lock-sub {
    font-size: 14px;
    color: #7a4040;
    margin-bottom: 2.5rem;
    line-height: 1.7;
    font-weight: 300;
    position: relative;
    z-index: 1;
  }

  .open-btn {
    background: transparent;
    border: 1px solid #810000;
    color: #e8c0c0;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    padding: 13px 36px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    position: relative;
    z-index: 1;
  }

  .open-btn:hover, .open-btn:active {
    background: #1a0000;
    border-color: #e8c0c0;
  }

  .countdown-hint {
    margin-top: 1.5rem;
    font-size: 12px;
    color: #3a1010;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .countdown-hint span { color: #810000; }

  .lav-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #c4a8d4;
    margin: 0 4px;
    vertical-align: middle;
    opacity: 0.6;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,0,0,0.92);
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 1.5rem;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: #120000;
    border: 1px solid #810000;
    border-radius: 20px;
    padding: 2rem;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #810000;
    margin-bottom: 0.75rem;
  }

  .modal-body {
    font-size: 14px;
    color: #7a4040;
    line-height: 1.7;
    margin-bottom: 1.2rem;
    font-weight: 300;
  }

  .modal-time {
    font-size: 13px;
    color: #5a2020;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .modal-close {
    background: transparent;
    border: 1px solid #3a1010;
    color: #7a4040;
    font-size: 13px;
    padding: 8px 24px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  .modal-close:hover { border-color: #810000; color: #e8c0c0; }
</style>
</head>
<body>

  <div class="lock-page">
    <div class="bg-blob" style="width:350px;height:350px;top:-120px;right:-100px;"></div>
    <div class="bg-blob" style="width:220px;height:220px;bottom:-80px;left:-70px;"></div>

    <div class="big-clock" id="live-clock">--:--:-- --</div>
    <div class="clock-date">april 7 <span class="lav-dot"></span> 2025</div>

    <h1 class="lock-title">something is waiting for you.</h1>
    <p class="lock-sub">
      open it when the clock hits<br>
      <span style="color:#810000; font-size:16px; font-weight:500;">3:10 PM</span>
    </p>

    <button class="open-btn" id="open-btn" onclick="tryOpen()">open ♡</button>

    <div class="countdown-hint" id="countdown-hint">unlocks in &nbsp;<span id="cd-text">--:--:--</span></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">not now bitchhhhh 🔒</div>
      <p class="modal-body" id="modal-body">the clock hasn't hit 8:37 yet.<br>be patient, guava.</p>
      <p class="modal-time">
        unlocks at <span style="color:#810000;">3:10 PM</span><br>
        <span id="modal-cd" style="color:#5a2020;">—</span> to go
      </p>
      <button class="modal-close" onclick="closeModal()">okay fine 🙄</button>
    </div>
  </div>

<script>
  let modalCount = 0;

  function pad(n) { return String(n).padStart(2,'0'); }

  function isUnlocked() {
    const n = new Date();
    return n.getHours() > 15 || (n.getHours() === 15 && n.getMinutes() >= 10);
  }

  function getTimeLeft() {
    const now = new Date();
    const unlock = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 15, 10, 0);
    return Math.max(0, unlock - now);
  }

  function fmtMs(ms) {
    const t = Math.floor(ms / 1000);
    return [Math.floor(t/3600), Math.floor((t%3600)/60), t%60].map(pad).join(':');
  }

  function tickClock() {
    const n = new Date();
    let h = n.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('live-clock').textContent =
      pad(h)+':'+pad(n.getMinutes())+':'+pad(n.getSeconds())+' '+ampm;

    const left = getTimeLeft();
    const cd = document.getElementById('cd-text');
    const openBtn = document.getElementById('open-btn');
    const countdownHint = document.getElementById('countdown-hint');
    
    // Auto-redirect to page2 when time hits 8:37 PM
    if (left === 0) {
      cd.textContent = 'redirecting...';
      cd.style.color = '#810000';
      openBtn.textContent = 'open now ♡';
      countdownHint.style.opacity = '0.5';
      // Auto-redirect after a short delay
      setTimeout(() => {
        window.location.href = 'page2.html';
      }, 500);
    } else {
      cd.textContent = fmtMs(left);
      openBtn.textContent = 'open ♡';
      countdownHint.style.opacity = '1';
    }

    const mcd = document.getElementById('modal-cd');
    if (mcd) mcd.textContent = left === 0 ? 'right now!!' : fmtMs(left);
  }

  function tryOpen() {
    if (isUnlocked()) {
      closeModal();
      window.location.href = 'page2.html';
      return;
    }
    modalCount++;
    document.getElementById('modal-title').textContent =
      modalCount === 1 ? 'not now bitchhhhh 🔒' : 'I saiddd not nowww 😭';
    document.getElementById('modal-body').innerHTML =
      modalCount === 1
        ? "the clock hasn't hit 8:37 yet.<br>be patient, guava."
        : "let the clock hit <span style='color:#810000'>8:37 PM</span> first!<br>stop trying to cheat.";
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  // Check if already unlocked on page load and redirect immediately
  if (isUnlocked()) {
    window.location.href = 'page2.html';
  }

  setInterval(tickClock, 1000);
  tickClock();
</script>
</body>
</html>
